name: Documentation

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
      statuses: write
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      # The fifteen packages are independent repositories that find each other
      # through [sources] path dependencies (`Networks = {path = "../Networks.jl"}`).
      # A lone checkout has no siblings, so those paths dangle and Pkg fails to
      # resolve before a single test runs. Rebuild the layout every developer has
      # locally: this package in a directory named after it, siblings beside it.
      - uses: actions/checkout@v4
        with:
          path: TSNA.jl

      - name: Reconstruct the ecosystem layout
        shell: bash
        run: |
          org=https://github.com/statistical-network-analysis-with-Julia
          for pkg in Networks NetworkDynamic SNA; do
            git clone --depth 1 --quiet "$org/$pkg.jl" "$pkg.jl"
          done

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - uses: julia-actions/cache@v2

      # docs/Project.toml already sources this package as `{path = ".."}`, so
      # instantiate is all that is needed. (A Pkg.develop(path=pwd()) here would
      # rewrite that entry to an absolute path.)
      - name: Install dependencies
        shell: bash
        working-directory: TSNA.jl
        run: julia --project=docs -e 'using Pkg; Pkg.instantiate()'

      - name: Build and deploy documentation
        shell: bash
        working-directory: TSNA.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=docs docs/make.jl
