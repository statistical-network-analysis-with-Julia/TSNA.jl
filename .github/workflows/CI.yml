name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          # The ecosystem requires Julia >= 1.12.
          - '1.12'
          - '1'
          - 'nightly'
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        arch:
          - x64
        exclude:
          - version: 'nightly'
            os: macos-latest
          - version: 'nightly'
            os: windows-latest
    steps:
      # The fifteen packages are independent repositories that find each other
      # through [sources] path dependencies (`Networks = {path = "../Networks.jl"}`).
      # A lone checkout has no siblings, so those paths dangle and Pkg fails to
      # resolve before a single test runs. Rebuild the layout every developer has
      # locally: this package in a directory named after it, siblings beside it.
      - uses: actions/checkout@v4
        with:
          path: TSNA.jl

      - name: Reconstruct the ecosystem layout
        shell: bash
        run: |
          org=https://github.com/statistical-network-analysis-with-Julia
          for pkg in Networks NetworkDynamic SNA; do
            git clone --depth 1 --quiet "$org/$pkg.jl" "$pkg.jl"
          done

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - uses: julia-actions/cache@v2

      - name: Run tests
        shell: bash
        working-directory: TSNA.jl
        run: julia --project=. -e 'using Pkg; Pkg.test(coverage=true)'

      - uses: julia-actions/julia-processcoverage@v1
        if: matrix.version == '1' && matrix.os == 'ubuntu-latest'
        with:
          directories: TSNA.jl/src

      - uses: codecov/codecov-action@v4
        if: matrix.version == '1' && matrix.os == 'ubuntu-latest'
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
